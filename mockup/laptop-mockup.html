<!--
  THROWAWAY MOCKUP — scroll-controlled photoreal laptop (real GLB)
  Model: mockup/laptop.glb (MacBook Pro 13", timblewee, CC-BY). Screen image:
  violetcraftworks-computer-img.png embedded in screen-image.js.

  Draco-compressed → must be SERVED (decoder runs in a worker; file:// blocks it).
  View:  python -m http.server 8777   (from the mockup/ folder)  →  http://127.0.0.1:8777/laptop-mockup.html
  Delete: remove the mockup/ folder.

  Hinge: the model ships a rigged open/close clip. We scrub clip time [0 → 0.30]
  (closed → fully open) from scroll progress, so it reverses naturally.
  Screen: image is mapped onto mesh "Object_7" (material Material.002).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Laptop scroll mockup</title>
<style>
  :root { color-scheme: dark; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: radial-gradient(120% 80% at 50% 0%, #15151c 0%, #0b0b0f 60%, #08080b 100%); color: #e7e7ea; font-family: -apple-system, system-ui, sans-serif; }
  .track { height: 380vh; position: relative; }
  .stage { position: sticky; top: 0; height: 100vh; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
  .caption { position: absolute; left: 50%; bottom: 7vh; transform: translateX(-50%); text-align: center; pointer-events: none; opacity: 0; transition: opacity .5s; letter-spacing: .04em; font-size: 14px; color: #b9b9c4; }
  .caption.show { opacity: 1; }
  .hint { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; color: #6f6f79; letter-spacing: .08em; text-transform: uppercase; z-index: 2; }
  .before, .after { height: 55vh; display: flex; align-items: center; justify-content: center; color: #45454e; letter-spacing: .1em; text-transform: uppercase; font-size: 13px; }
  /* fallback shown if WebGL/model fails */
  #fallback { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: #0b0b0f; padding: 6vw; }
  #fallback img { max-width: min(900px, 90vw); width: 100%; border-radius: 10px; box-shadow: 0 30px 80px rgba(0,0,0,.6); }
</style>
</head>
<body>
  <div class="hint">scroll ↓ to open · scroll ↑ to close</div>
  <div class="before">— page content above —</div>
  <div class="track">
    <div class="stage">
      <canvas id="scene"></canvas>
      <div class="caption" id="caption">VioletCraftworks · built end to end</div>
    </div>
  </div>
  <div class="after">— page content below —</div>
  <div id="fallback"><img id="fallbackImg" alt="Website preview" /></div>

  <script src="screen-image.js"></script>
  <script type="importmap">
  { "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  } }
  </script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <script type="module">
    import * as THREE from "three";
    import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
    import { DRACOLoader } from "three/addons/loaders/DRACOLoader.js";
    import { RoomEnvironment } from "three/addons/environments/RoomEnvironment.js";

    const reduce = matchMedia("(prefers-reduced-motion: reduce)").matches;
    const canvas = document.getElementById("scene");
    const caption = document.getElementById("caption");

    function showFallback() {
      const fb = document.getElementById("fallback");
      if (window.SCREEN_IMAGE_DATA_URL) document.getElementById("fallbackImg").src = window.SCREEN_IMAGE_DATA_URL;
      fb.style.display = "flex";
    }
    if (!window.WebGLRenderingContext) { showFallback(); throw new Error("no webgl");

    }

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(Math.max(devicePixelRatio, 2), 3)); // supersample so the small screen text stays crisp
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.92;

    const scene = new THREE.Scene();
    const pmrem = new THREE.PMREMGenerator(renderer);
    scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

    const camera = new THREE.PerspectiveCamera(30, 1, 0.01, 100);

    const key = new THREE.DirectionalLight(0xfff2e6, 1.7); key.position.set(0.4, 0.6, 0.5); scene.add(key);
    const rim = new THREE.DirectionalLight(0xbcd4ff, 1.3); rim.position.set(-0.5, 0.3, -0.4); scene.add(rim);
    scene.add(new THREE.AmbientLight(0xffffff, 0.15));

    // soft ground shadow
    const shadowTex = (() => {
      const c = document.createElement("canvas"); c.width = c.height = 256; const x = c.getContext("2d");
      const g = x.createRadialGradient(128, 128, 8, 128, 128, 128);
      g.addColorStop(0, "rgba(0,0,0,.5)"); g.addColorStop(1, "rgba(0,0,0,0)");
      x.fillStyle = g; x.fillRect(0, 0, 256, 256); return new THREE.CanvasTexture(c);
    })();

    const rig = new THREE.Group();      // entrance + rotation wrapper
    scene.add(rig);

    let mixer = null, clipDur = 1, model = null;
    const LID_OPEN_FRAC = 0.30;         // clip time fraction where lid is fully open

    const draco = new DRACOLoader();
    draco.setDecoderPath("https://www.gstatic.com/draco/versioned/decoders/1.5.6/");
    const loader = new GLTFLoader();
    loader.setDRACOLoader(draco);

    loader.load("./laptop.glb", (gltf) => {
      model = gltf.scene;

      // center + scale to a convenient size
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      model.position.sub(center);                       // recenter to origin
      const s = 1.4 / Math.max(size.x, size.z);         // normalize footprint
      model.scale.setScalar(s);
      rig.add(model);

      // ground shadow under the base
      const shadow = new THREE.Mesh(new THREE.PlaneGeometry(2.4, 2.4),
        new THREE.MeshBasicMaterial({ map: shadowTex, transparent: true, depthWrite: false }));
      shadow.rotation.x = -Math.PI / 2; shadow.position.y = -size.y * s * 0.5 - 0.02;
      rig.add(shadow);

      // swap the screen image onto Object_7 (Material.002)
      const screen = model.getObjectByName("Object_7");
      if (screen && window.SCREEN_IMAGE_DATA_URL) {
        new THREE.TextureLoader().load(window.SCREEN_IMAGE_DATA_URL, (t) => {
          t.colorSpace = THREE.SRGBColorSpace;
          t.flipY = false;
          t.wrapS = t.wrapT = THREE.RepeatWrapping;      // this mesh's UVs need a vertical flip
          const zoom = 0.85;                             // <1 zooms the page in (crops edges, sharper)
          t.repeat.x = zoom;  t.offset.x = (1 - zoom) / 2;   // center horizontally
          t.repeat.y = -zoom; t.offset.y = zoom;             // flip + anchor to the very top (crop only the bottom)
          t.anisotropy = renderer.capabilities.getMaxAnisotropy();
          // real screens are self-lit: unlit material shows the page's true colors,
          // scaled only by tone-mapping exposure — no double lighting / env glow.
          const m = new THREE.MeshBasicMaterial({ map: t, toneMapped: false });
          m.color = new THREE.Color(0xececec);           // screen brightness knob (0xffffff = full)
          m.polygonOffset = true;                        // bias the display in front of the glass cover
          m.polygonOffsetFactor = -4; m.polygonOffsetUnits = -4;  // kills z-fighting flicker
          screen.material = m;
        });
      }

      // hinge clip → scrub source
      mixer = new THREE.AnimationMixer(model);
      const action = mixer.clipAction(gltf.animations[0]);
      action.play(); // paused stays false; we drive time via setTime and never call update()
      clipDur = gltf.animations[0].duration;

      apply(state.p);
    },
    undefined,
    (err) => { console.error("GLB load failed", err); showFallback(); });

    // ---- scroll state ----
    const state = { p: reduce ? 1 : 0 };
    const clamp = (a, b, t) => Math.min(1, Math.max(0, (t - a) / (b - a)));
    const smooth = (t) => t * t * (3 - 2 * t);

    function apply(p) {
      const enter  = smooth(clamp(0.00, 0.12, p));
      const lidP   = smooth(clamp(0.12, 0.62, p));
      const turn   = smooth(clamp(0.12, 0.70, p));
      const settle = smooth(clamp(0.55, 0.75, p));

      if (mixer) mixer.setTime(lidP * LID_OPEN_FRAC * clipDur);   // closed → open
      rig.rotation.y = THREE.MathUtils.lerp(-0.5, -0.22, turn);
      rig.rotation.x = THREE.MathUtils.lerp(0.12, -0.02, turn);
      rig.position.y = THREE.MathUtils.lerp(-0.7, 0.05, enter);
      rig.scale.setScalar(THREE.MathUtils.lerp(0.92, 1.0, enter));

      // camera: pull back enough to keep the open lid fully framed, settle to three-quarter
      camera.position.set(0, 0.55, THREE.MathUtils.lerp(4.1, 3.6, settle));
      camera.lookAt(0, 0.28, 0);
      caption.classList.toggle("show", p > 0.62);
    }
    apply(state.p);

    if (!reduce) {
      gsap.registerPlugin(ScrollTrigger);
      gsap.to(state, {
        p: 1, ease: "none",
        scrollTrigger: { trigger: ".track", start: "top top", end: "bottom bottom", scrub: 0.6 },
        onUpdate: () => apply(state.p),
      });
    }

    function resize() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h; camera.updateProjectionMatrix();
    }
    new ResizeObserver(resize).observe(canvas); resize();
    renderer.setAnimationLoop(() => renderer.render(scene, camera));

    window.__dbg = { scene, camera, state, renderer };
  </script>
</body>
</html>
